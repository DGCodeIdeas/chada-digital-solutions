<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up — ApexFlow</title>
  <meta name="description" content="Create your ApexFlow account and start automating your business." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="auth-page">
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="grid-overlay" style="position: absolute; inset: 0; opacity: 0.5;"></div>

  <div class="auth-card">
    <div class="auth-header">
      <a href="../" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 2L28 9v14L16 30 4 23V9l12-7z" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M16 8l8 4.5v9L16 26l-8-4.5v-9L16 8z" fill="currentColor" opacity="0.3"/>
            <circle cx="16" cy="17" r="3" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">ApexFlow</span>
      </a>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start automating your business in minutes</p>
    </div>

    <form class="auth-form" id="signup-form">
      <div class="form-field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="John Doe" required />
      </div>
      <div class="form-field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" required />
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required />
      </div>
      <div class="form-field">
        <label for="company">Company name</label>
        <input type="text" id="company" placeholder="Acme Inc." />
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Create Account</button>

      <div class="auth-divider">or sign up with</div>

      <div class="social-login">
        <button type="button" class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button type="button" class="social-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405 1.02 0 2.04.135 3 .405 2.28-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="./">Sign in</a>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      const form = document.getElementById('signup-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        btn.textContent = 'Creating account...';
        btn.disabled = true;
        
        setTimeout(() => {
          btn.textContent = 'Create Account';
          btn.disabled = false;
          showToast('Account created! Welcome to ApexFlow.', 'success');
          setTimeout(() => {
            window.location.href = '../dashboard/';
          }, 1500);
        }, 1500);
      });
    })();
  </script>
</body>
</html>
