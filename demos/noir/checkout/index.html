<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — NOIR</title>
  <meta name="description" content="Checkout — NOIR luxury fashion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

  <header class="nav-header" id="nav-header">
    <div class="nav-container">
      <a href="../" class="logo">NOIR<span>.</span></a>
      <nav class="nav-menu" id="nav-menu">
        <a href="../">Home</a>
        <a href="../shop/">Shop</a>
        <a href="../shop/">New Arrivals</a>
        <a href="../shop/">Collections</a>
      </nav>
      <div class="nav-actions">
        <a href="../shop/" class="nav-icon" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </a>
        <a href="../cart/" class="nav-icon" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="breadcrumb">
    <a href="../">Home</a> <span>/</span> <a href="../cart/">Cart</a> <span>/</span> Checkout
  </div>

  <div class="checkout-page">
    <h1 class="checkout-title">Checkout</h1>
    <form class="checkout-form" id="checkout-form">
      <div>
        <div class="checkout-section">
          <h3 class="checkout-section-title">Contact Information</h3>
          <div class="form-field full">
            <label>Email Address</label>
            <input type="email" placeholder="name@company.com" required />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>First Name</label>
              <input type="text" placeholder="John" required />
            </div>
            <div class="form-field">
              <label>Last Name</label>
              <input type="text" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-field full">
            <label>Phone Number</label>
            <input type="tel" placeholder="+234 800 000 0000" required />
          </div>
        </div>
        <div class="checkout-section">
          <h3 class="checkout-section-title">Shipping Address</h3>
          <div class="form-field full">
            <label>Street Address</label>
            <input type="text" placeholder="123 Victoria Island Road" required />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>City</label>
              <input type="text" placeholder="Lagos" required />
            </div>
            <div class="form-field">
              <label>State</label>
              <input type="text" placeholder="Lagos State" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Postal Code</label>
              <input type="text" placeholder="101241" required />
            </div>
            <div class="form-field">
              <label>Country</label>
              <select required>
                <option value="">Select country</option>
                <option value="NG">Nigeria</option>
                <option value="GH">Ghana</option>
                <option value="KE">Kenya</option>
                <option value="ZA">South Africa</option>
                <option value="US">United States</option>
                <option value="UK">United Kingdom</option>
              </select>
            </div>
          </div>
        </div>
        <div class="checkout-section">
          <h3 class="checkout-section-title">Payment Method</h3>
          <div class="payment-methods">
            <label class="payment-method selected">
              <input type="radio" name="payment" value="card" checked />
              <span>Credit / Debit Card</span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="transfer" />
              <span>Bank Transfer</span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="paystack" />
              <span>Paystack</span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 16px;">Place Order</button>
      </div>
      <div>
        <div class="checkout-section" style="border: 1px solid var(--border); padding: 32px;">
          <h3 class="checkout-section-title">Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal">$0</span></div>
          <div class="summary-row"><span>Shipping</span><span>$15</span></div>
          <div class="summary-row total"><span>Total</span><span id="checkout-total">$0</span></div>
        </div>
      </div>
    </form>
  </div>

  <footer class="footer" style="margin-top: 60px;">
    <div class="footer-bottom" style="border: none; padding-top: 0;">
      <p> NOIR. Built by <a href="https://chadadigital.com" style="color: var(--gold);">Chada Digital</a>.</p>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
